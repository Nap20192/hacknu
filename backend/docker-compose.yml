version: '3.9'

services:
  postgres:
    image: timescale/timescaledb:latest-pg15
    container_name: hacknu_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hacknu_server
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:${POSTGRES_PORT}/${POSTGRES_DB}?sslmode=disable
      PORT: ${PORT}
      LOG_LEVEL: ${LOG_LEVEL}
      LOG_PRETTY: "false"
      SWAGGER_HOST: ${SWAGGER_HOST}
      ADMIN_USER: ${ADMIN_USER}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      BUFFER_CAP: ${BUFFER_CAP}
      FLUSH_INTERVAL_MS: ${FLUSH_INTERVAL_MS}
      TELEMETRY_RETENTION: ${TELEMETRY_RETENTION}
      EMA_RECALC_INTERVAL: ${EMA_RECALC_INTERVAL}
    ports:
      - "${PORT}:${PORT}"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./metrics.yaml:/app/metrics.yaml
      - ./db/migrations:/app/db/migrations
    entrypoint: ["./entrypoint.sh"]

  simulation:
    build:
      context: .
      dockerfile: ./cmd/simulation/Dockerfile
    container_name: hacknu_simulation
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:${POSTGRES_PORT}/${POSTGRES_DB}?sslmode=disable
      LOCO_ID: ${LOCO_ID}
      TICK_INTERVAL: ${TICK_INTERVAL}
      METRICS_CONFIG: ${METRICS_CONFIG}
      MIGRATIONS_PATH: ${MIGRATIONS_PATH}
    depends_on:
      postgres:
        condition: service_healthy

  alerts:
    build:
      context: .
      dockerfile: ./cmd/alerts/Dockerfile
    container_name: hacknu_alerts
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://loco:loco_secret@postgres:5432/loco_twin?sslmode=disable
    ports:
      - "8081:8080"
    depends_on:
      postgres:
        condition: service_healthy
      server:
        condition: service_started
    volumes:
      - ./metrics.yaml:/app/metrics.yaml
      - ./db/migrations:/app/db/migrations
    entrypoint: ["./simulator"]

volumes:
  postgres_data:
