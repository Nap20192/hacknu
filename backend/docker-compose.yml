version: '3.9'

services:
  postgres:
    image: timescale/timescaledb:latest-pg15
    container_name: hacknu_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hacknu_server
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
      PORT: ${PORT:-8081}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_PRETTY: "false"
      BUFFER_CAP: ${BUFFER_CAP:-50}
      FLUSH_INTERVAL_MS: ${FLUSH_INTERVAL_MS:-500}
      TELEMETRY_RETENTION: ${TELEMETRY_RETENTION:-72h}
      EMA_RECALC_INTERVAL: ${EMA_RECALC_INTERVAL:-1h}
    ports:
      - "${PORT:-8081}:${PORT:-8081}"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./metrics.yaml:/app/metrics.yaml
      - ./db/migrations:/app/db/migrations
    entrypoint: ["./entrypoint.sh"]

  simulation:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hacknu_simulation
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
      LOCO_ID: ${LOCO_ID:-00000000-0000-0000-0000-000000000001}
      TICK_INTERVAL: ${TICK_INTERVAL:-1s}
      METRICS_CONFIG: /app/metrics.yaml
      WS_URL: ws://server:${PORT:-8081}/ws/telemetry
    depends_on:
      server:
        condition: service_started
    volumes:
      - ./metrics.yaml:/app/metrics.yaml
    entrypoint: ["./simulator"]

volumes:
  postgres_data:
