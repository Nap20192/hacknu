version: "2"
overrides:
  go:
    overrides:
      # date
      - db_type: "date"
        go_type:
          type: string

      - db_type: "date"
        nullable: true
        go_type:
          type: string
          pointer: true

      # time.Time
      - db_type: "timestamptz"
        go_type:
          import: "time"
          type: "Time"

      - db_type: "timestamptz"
        nullable: true
        go_type:
          import: "time"
          type: "Time"
          pointer: true

      # bool
      - db_type: "boolean"
        go_type:
          type: "bool"

      - db_type: "boolean"
        nullable: true
        go_type:
          type: "bool"
          pointer: true

      # string
      - db_type: "text"
        go_type:
          type: "string"

      - db_type: "text"
        nullable: true
        go_type:
          type: "string"
          pointer: true

      # string
      - db_type: "BIGSERIAL"
        nullable: true
        go_type:
          type: "int64"
      - db_type: "BIGSERIAL"
        nullable: true
        go_type:
          type: "int64"
          pointer: true


      - db_type: "SMALLINT"
        nullable: true
        go_type:
          type: "int64"
          pointer: true

      - db_type: "real"
        nullable: true
        go_type:
          type: "float32"

      - db_type: "real"
        nullable: true
        go_type:
          type: "float32"
          pointer: true

      # any
      - db_type: "jsonb"
        nullable: true
        go_type:
          type: "any"

sql:
  - engine: "postgresql"
    queries: "db/queries"
    schema:  "db/migrations"
    gen:
      go:
        package:              "sqlc"
        out:                  "gen/sqlc"
        emit_json_tags:       true
        emit_interface:       true
        emit_exact_table_names: false
        emit_empty_slices:    true
        sql_package:          "pgx/v5"
